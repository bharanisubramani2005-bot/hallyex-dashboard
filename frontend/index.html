<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gateway | NutriShake Bar</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF7EB6",
                        "secondary": "#FF4F81",
                        "bg-dark": "#FFF0F6",
                        "bg-darker": "#FFE4F0",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #FFF0F6;
            color: #1F2937;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .gateway-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(255, 79, 129, 0.1);
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #FFF0F6;
            background: #FFF0F6;
            margin-top: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .option-btn:hover {
            border-color: #FF7EB6;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 126, 182, 0.15);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="gateway-card">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">
                <span class="text-primary">Nutri</span><span class="text-secondary">Shake</span>
                <span class="text-secondary text-base font-bold ml-0.5">Bar</span>
            </h1>
            <p class="text-sm text-gray-400 font-medium">Select your portal to continue</p>
        </div>

        <a href="home.html" class="option-btn">
            <div class="icon-box bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-2xl">storefront</span>
            </div>
            <div class="text-left flex-1">
                <h3 class="font-bold text-gray-800 text-base">Customer Storefront</h3>
                <p class="text-[11px] text-gray-400 font-medium mt-0.5">Browse menu and place orders</p>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
        </a>

        <a href="admin-login.html" class="option-btn">
            <div class="icon-box bg-gray-100 text-gray-600">
                <span class="material-symbols-outlined text-2xl">admin_panel_settings</span>
            </div>
            <div class="text-left flex-1">
                <h3 class="font-bold text-gray-800 text-base">Admin Dashboard</h3>
                <p class="text-[11px] text-gray-400 font-medium mt-0.5">Manage products and analytics</p>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
        </a>

    </div>

</body>

</html>
